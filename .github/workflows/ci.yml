name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/machina

      - name: Tests
        run: pytest tests/ -v --cov=machina --cov-report=term-missing --cov-report=xml

      - name: Per-module coverage floors (core modules)
        # Floors set below the measured baseline with a ~5% buffer so
        # refactors have headroom but a silent regression in any core
        # module fails CI. Lowered in v0.3 because MCP/Excel tests are
        # skipped when optional deps are absent (importorskip guards).
        run: |
          coverage report --include='src/machina/agent/**'         --fail-under=80
          coverage report --include='src/machina/config/**'        --fail-under=80
          coverage report --include='src/machina/llm/**'           --fail-under=90
          coverage report --include='src/machina/observability/**' --fail-under=75
          coverage report --include='src/machina/workflows/**'     --fail-under=85

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  validate-examples:
    name: Validate examples & doc snippets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate doc snippets (syntax + imports)
        run: python tests/validate_doc_snippets.py

      - name: Validate example scripts (syntax + imports)
        run: python tests/validate_examples.py

      - name: Validate workflow action strings
        run: pytest tests/test_example_actions.py -v

      - name: Validate model attribute access
        run: python tests/validate_model_access.py

  docs:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build docs (strict)
        run: mkdocs build --strict
